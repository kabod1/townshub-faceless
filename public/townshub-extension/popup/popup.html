<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Townshub</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>

  <!-- Header -->
  <div class="header">
    <div class="logo">
      <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg" width="26" height="26">
        <rect x="3"  y="3"  width="34" height="11" fill="white"/>
        <rect x="33" y="3"  width="5"  height="11" fill="white"/>
        <rect x="3"  y="14" width="12" height="47" fill="white"/>
        <rect x="33" y="18" width="9"  height="43" fill="white"/>
        <rect x="33" y="30" width="28" height="10" fill="white"/>
        <rect x="52" y="3"  width="9"  height="58" fill="white"/>
      </svg>
    </div>
    <div class="header-text">
      <span class="brand">Townshub</span>
      <span class="sub" id="headerSub">CHANNEL ANALYZER</span>
    </div>
    <div class="status-dot" id="statusDot"></div>
  </div>

  <!-- Dynamic content injected by popup.js -->
  <div id="mainContent"></div>

  <!-- Footer -->
  <div class="footer" id="footerText">
    Townshub Faceless — YouTube Growth Studio
  </div>

  <script src="popup.js"></script>
</body>
</html>
